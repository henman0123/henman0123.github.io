<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2"/>
      <stop offset="100%" style="stop-color:#6ab4f5"/>
    </linearGradient>
  </defs>
  <!-- 背景圓角方形 -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <!-- 3x3 書籤格子，模擬 dashboard 卡片佈局 -->
  <!-- 列 1 -->
  <rect x="5"  y="5"  width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.9"/>
  <rect x="13" y="5"  width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <rect x="21" y="5"  width="6" height="5" rx="1.5" fill="url(#accent)" opacity="0.4"/>
  <!-- 列 2 -->
  <rect x="5"  y="12" width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <rect x="13" y="12" width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.9"/>
  <rect x="21" y="12" width="6" height="5" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- 列 3 -->
  <rect x="5"  y="19" width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.4"/>
  <rect x="13" y="19" width="7" height="5" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <!-- 搜尋欄暗示 -->
  <rect x="5"  y="26" width="22" height="2" rx="1" fill="#4a90e2" opacity="0.35"/>
  <rect x="21" y="19" width="6" height="5" rx="1.5" fill="url(#accent)" opacity="0.9"/>
</svg>
